name: QA Automation Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-html

      - name: Run API tests and generate reports
        run: |
          pytest tests/api -v \
            --html=api-report.html --self-contained-html \
            --junitxml=api-results.xml

      - name: Upload API HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-pytest-html-report
          path: api-report.html

      - name: Upload API JUnit XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-junit-report
          path: api-results.xml

  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-html

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-chromedriver: true

      - name: Run UI tests and generate reports
        env:
          CI: "true"
        run: |
          pytest tests/ui -v \
            --html=ui-report.html --self-contained-html \
            --junitxml=ui-results.xml

      - name: Upload UI HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-pytest-html-report
          path: ui-report.html

      - name: Upload UI JUnit XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-junit-report
          path: ui-results.xml